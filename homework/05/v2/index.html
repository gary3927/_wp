<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購物車 - v2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🛒 線上購物</h1>
    <p class="subtitle">v2 — 加入 CSS 樣式美化</p>
  </header>

  <main>

    <section class="products">
      <h2>商品列表</h2>
      <div class="product-grid">

        <div class="product-card">
          <div class="product-image">🎧</div>
          <h3>無線藍牙耳機</h3>
          <p class="price">$1,290</p>
          <span class="stock in-stock">有貨</span>
        </div>

        <div class="product-card">
          <div class="product-image">⌨️</div>
          <h3>機械式鍵盤</h3>
          <p class="price">$2,490</p>
          <span class="stock in-stock">有貨</span>
        </div>

        <div class="product-card">
          <div class="product-image">🔋</div>
          <h3>行動電源 10000mAh</h3>
          <p class="price">$890</p>
          <span class="stock in-stock">有貨</span>
        </div>

        <div class="product-card">
          <div class="product-image">🔌</div>
          <h3>USB-C 多功能 Hub</h3>
          <p class="price">$690</p>
          <span class="stock in-stock">有貨</span>
        </div>

        <div class="product-card">
          <div class="product-image">💻</div>
          <h3>筆電鋁合金支架</h3>
          <p class="price">$1,190</p>
          <span class="stock in-stock">有貨</span>
        </div>

        <div class="product-card">
          <div class="product-image">🖱️</div>
          <h3>電競滑鼠墊 (加大)</h3>
          <p class="price">$350</p>
          <span class="stock in-stock">有貨</span>
        </div>

      </div>
    </section>

    <section class="cart">
      <h2>購物車</h2>
      <div class="cart-empty">
        <p>購物車中沒有商品</p>
      </div>
    </section>

  </main>

  <footer>
    <p><small>版本 v2 — 加入 CSS 樣式</small></p>
  </footer>

</body>
</html>
