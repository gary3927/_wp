<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>林楷睿 - 個人網頁</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'PingFang TC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .avatar {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; color: white;
      margin: 0 auto 1.5rem;
    }
    h1 { text-align: center; font-size: 1.8rem; color: #333; }
    .subtitle {
      text-align: center; color: #888; margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .section { margin-bottom: 1.5rem; }
    .section h2 {
      font-size: 1.1rem; color: #667eea; margin-bottom: 0.75rem;
      border-left: 3px solid #667eea; padding-left: 0.75rem;
    }
    .section p, .section li { font-size: 0.95rem; color: #555; line-height: 1.8; }
    .section ul { list-style: none; padding: 0; }
    .section ul li::before { content: '▸ '; color: #667eea; }
    .skills {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
    }
    .skills span {
      background: #f0f0ff; color: #667eea;
      padding: 0.3rem 0.8rem; border-radius: 20px;
      font-size: 0.85rem;
    }
    .footer {
      text-align: center; margin-top: 2rem;
      font-size: 0.8rem; color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👤</div>
    <h1>林楷睿</h1>
    <p class="subtitle">金門大學 資訊工程系</p>

    <div class="section">
      <h2>關於我</h2>
      <p>我是金門大學資訊工程系的學生，目前正在修習網頁設計課程。喜歡學習新技術，對前端開發與全端應用有濃厚的興趣。</p>
    </div>

    <div class="section">
      <h2>專業技能</h2>
      <div class="skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
        <span>Node.js</span>
        <span>Python</span>
        <span>Git</span>
      </div>
    </div>

    <div class="section">
      <h2>修課目標</h2>
      <ul>
        <li>掌握網頁前端開發技術（HTML / CSS / JavaScript）</li>
        <li>學習後端伺服器程式設計（Node.js）</li>
        <li>能夠獨立開發前後端整合的網站專案</li>
      </ul>
    </div>

    <div class="footer">
      &copy; 2026 林楷睿
    </div>
  </div>
</body>
</html>
