<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris - v1 單機版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>TETRIS</h1>
    <p class="subtitle">v1 — 單機版</p>
    <div class="game-wrapper">
      <div class="game-info">
        <div class="info-box">
          <span class="label">分數</span>
          <span id="score" class="value">0</span>
        </div>
        <div class="info-box">
          <span class="label">等級</span>
          <span id="level" class="value">1</span>
        </div>
        <div class="info-box">
          <span class="label">行數</span>
          <span id="lines" class="value">0</span>
        </div>
        <div class="info-box">
          <span class="label">最高分</span>
          <span id="high-score" class="value">0</span>
        </div>
      </div>
      <div class="game-board">
        <canvas id="game-canvas" width="300" height="600"></canvas>
      </div>
      <div class="side-panel">
        <div class="next-box">
          <span class="label">下一塊</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>
        <div class="controls-box">
          <span class="label">操作</span>
          <div class="controls">
            <div class="key">↑</div><span>旋轉</span>
            <div class="key">←</div><span>左移</span>
            <div class="key">→</div><span>右移</span>
            <div class="key">↓</div><span>加速</span>
            <div class="key space">空白</div><span>直接落下</span>
            <div class="key">R</div><span>重新開始</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="tetris.js"></script>
</body>
</html>
